services:
  - type: web
    name: super7-crm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: CRM_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: super7-db
          property: connectionString
      - key: ONTRAPORT_API_KEY
        sync: false
      - key: ONTRAPORT_APP_ID
        sync: false
      - key: EMBLUE_API_KEY
        sync: false
      - key: GS_CREDENTIALS_JSON
        sync: false
      - key: GS_SHEET_CABA
        sync: false
      - key: GS_SHEET_MDZ
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: super7-db
    databaseName: super7
    user: super7
    plan: free
